name: Android CI from ZIP

on:
  push:
    branches: [ "main", "master", "*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip -q CatEnglishApp.zip
        sleep 2
        TARGET_DIR=$(find . -name "build.gradle.kts" -not -path "*/app/*" -exec dirname {} \;)
        if [ ! -z "$TARGET_DIR" ] && [ "$TARGET_DIR" != "." ]; then
          mv $TARGET_DIR/* . 2>/dev/null || true
          mv $TARGET_DIR/.* . 2>/dev/null || true
        fi

    - name: Fix XML File Structure
      run: |
        # Sprawdzamy czy w pliku colors.xml brakuje domknięcia i je naprawiamy
        COLOR_FILE="app/src/main/res/values/colors.xml"
        if [ -f "$COLOR_FILE" ]; then
          if ! tail -n 1 "$COLOR_FILE" | grep -q "</resources>"; then
            echo "</resources>" >> "$COLOR_FILE"
            echo "Poprawiono plik colors.xml - dodano domknięcie tagu."
          fi
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
